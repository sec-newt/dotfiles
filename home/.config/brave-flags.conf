# Brave Browser Launch Flags
# Updated: 2026-02-22
#
# Previous config (2025-09-10) disabled GPU entirely to work around
# Brave + native Wayland + AMD RX 6600 lockups. This caused software-only
# video decoding (choppy YouTube).
#
# Fix: Force XWayland (X11) mode. This sidesteps the native Wayland lockup
# while keeping full GPU acceleration and hardware video decode.
# Mesa 25.3.5 may also have fixed the original lockup if native Wayland
# is ever desired again.

--ozone-platform=wayland
